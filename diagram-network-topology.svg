<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Network Topology — PLDT Fiber, ONT in Bridge Mode</title>
  <desc>Physical path from PLDT fiber to LAN clients through GL.iNet Flint 2. ONT is in bridge mode (modem-only), passing the WAN session directly to OpenWrt.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444c56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="280" fill="#0d1117" rx="12"/>
  <text x="450" y="28" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11" font-weight="600" letter-spacing="2">NETWORK TOPOLOGY — ONT IN BRIDGE MODE</text>
  <!-- PLDT -->
  <rect x="30" y="60" width="130" height="140" rx="8" fill="#0d1f36" stroke="#1f4068" stroke-width="1.5"/>
  <text x="95" y="100" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="13" font-weight="700">PLDT</text>
  <text x="95" y="118" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Fiber ISP</text>
  <line x1="50" y1="130" x2="140" y2="130" stroke="#1f4068" stroke-width="1"/>
  <text x="95" y="148" text-anchor="middle" fill="#39d0c8" font-family="monospace" font-size="10">IPv6 /56 PD</text>
  <text x="95" y="163" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">RA + DHCPv6</text>
  <text x="95" y="178" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">CGNAT IPv4</text>
  <!-- Arrow PLDT to ONT -->
  <line x1="162" y1="130" x2="208" y2="130" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="120" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">fiber</text>
  <!-- ONT -->
  <rect x="210" y="60" width="135" height="140" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="277" y="96" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12" font-weight="700">ONT / Modem</text>
  <line x1="225" y1="108" x2="330" y2="108" stroke="#30363d" stroke-width="1"/>
  <text x="277" y="124" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">no NAT, no routing</text>
  <text x="277" y="139" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">WAN session passed</text>
  <text x="277" y="154" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">directly to router</text>
  <line x1="225" y1="164" x2="330" y2="164" stroke="#30363d" stroke-width="1"/>
  <rect x="230" y="172" width="94" height="16" rx="3" fill="#0d2a16" stroke="#1a4428" stroke-width="1"/>
  <text x="277" y="183" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="9" font-weight="700">ONT bridge mode</text>
  <!-- Arrow ONT to Router -->
  <line x1="347" y1="130" x2="393" y2="130" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="120" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">eth1</text>
  <!-- Router -->
  <rect x="395" y="40" width="170" height="190" rx="8" fill="#0d2a16" stroke="#238636" stroke-width="2"/>
  <text x="480" y="70" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="12" font-weight="700">GL.iNet Flint 2</text>
  <text x="480" y="86" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">MT6000 / OpenWrt 25.x</text>
  <line x1="410" y1="95" x2="550" y2="95" stroke="#1a4428" stroke-width="1"/>
  <text x="480" y="111" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">reqaddress=none</text>
  <text x="480" y="126" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">reqprefix=56</text>
  <text x="480" y="141" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">accept_ra=1</text>
  <line x1="410" y1="151" x2="550" y2="151" stroke="#1a4428" stroke-width="1"/>
  <text x="480" y="167" text-anchor="middle" fill="#39d0c8" font-family="monospace" font-size="10">LAN /64 delegated</text>
  <text x="480" y="182" text-anchor="middle" fill="#d29922" font-family="monospace" font-size="10">watchdog active</text>
  <line x1="410" y1="191" x2="550" y2="191" stroke="#1a4428" stroke-width="1"/>
  <text x="480" y="206" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">IPv6: native DHCPv6+PD</text>
  <text x="480" y="220" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">not NAT6 / not tunnel</text>
  <!-- Arrow Router to LAN -->
  <line x1="567" y1="130" x2="613" y2="130" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="590" y="120" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">LAN</text>
  <!-- LAN Clients -->
  <rect x="615" y="65" width="125" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="677" y="88" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11" font-weight="700">PC / Phone</text>
  <text x="677" y="107" text-anchor="middle" fill="#39d0c8" font-family="monospace" font-size="9">IPv6 SLAAC /64</text>
  <rect x="615" y="135" width="125" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="677" y="158" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11" font-weight="700">IoT / Server</text>
  <text x="677" y="177" text-anchor="middle" fill="#39d0c8" font-family="monospace" font-size="9">IPv6 SLAAC /64</text>
  <!-- Arrow to Internet -->
  <line x1="742" y1="130" x2="778" y2="130" stroke="#444c56" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-gray)"/>
  <!-- Internet -->
  <rect x="780" y="60" width="100" height="140" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="830" y="98" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12" font-weight="700">Internet</text>
  <line x1="795" y1="110" x2="865" y2="110" stroke="#30363d" stroke-width="1"/>
  <text x="830" y="128" text-anchor="middle" fill="#39d0c8" font-family="monospace" font-size="10">IPv6 native</text>
  <text x="830" y="144" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">2001:4860::/32</text>
  <text x="830" y="160" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">2606:4700::/32</text>
  <text x="830" y="181" text-anchor="middle" fill="#444c56" font-family="monospace" font-size="9">IPv4 CGNAT</text>
  <!-- Legend -->
  <line x1="30" y1="234" x2="50" y2="234" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="58" y="238" fill="#8b949e" font-family="monospace" font-size="9">active WAN path</text>
  <line x1="185" y1="234" x2="205" y2="234" stroke="#444c56" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-gray)"/>
  <text x="213" y="238" fill="#8b949e" font-family="monospace" font-size="9">routed traffic</text>
  <rect x="320" y="228" width="11" height="11" rx="2" fill="#0d2a16" stroke="#238636" stroke-width="1.5"/>
  <text x="338" y="237" fill="#8b949e" font-family="monospace" font-size="9">this guide applies here (edge device)</text>
  <!-- Scope note -->
  <text x="450" y="263" text-anchor="middle" fill="#30363d" font-family="monospace" font-size="9">guide scope: native DHCPv6 + prefix delegation only — not applicable to NAT6, static IPv6, or tunnel setups</text>
</svg>
